server:
  port: 8080

spring:
  application:
    name: paper-crown-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/papercrown
    username: papercrown
    password: papercrown
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
